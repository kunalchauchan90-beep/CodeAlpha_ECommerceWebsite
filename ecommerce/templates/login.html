<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>User Login</h1>

{% if error %}
<p>{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <label>Username:</label><br>
    <input type="text" name="username"><br><br>

    <label>Password:</label><br>
    <input type="password" name="password"><br><br>

    <button type="submit">Login</button>

</form>

</body>
</html>
